# =============================================================
# BATTERY FUSION — Adaptive Learning Templates
# Wersja: 1.0
#
# Szablony sensorów dla systemu adaptacyjnej kalibracji SoC.
# =============================================================

template:
  - sensor:
      # Finalny SoC z korekcją adaptacyjną
      - name: "Battery Fusion SOC Final"
        unique_id: battery_fusion_soc_final
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        state: >
          {% set soc = states('sensor.battery_fusion_soc') | float(0) %}
          {% set corr = states('input_number.bf_soc_correction') | float(0) %}
          {{ [0, [100, soc + corr] | min] | max | round(1) }}
        attributes:
          base_soc: "{{ states('sensor.battery_fusion_soc') | float(0) | round(1) }}"
          correction: "{{ states('input_number.bf_soc_correction') | float(0) | round(2) }}"
          learning_samples: "{{ states('input_number.bf_learning_samples') | int(0) }}"
          adaptive_efficiency: "{{ states('input_number.bf_adaptive_efficiency') | float(97) | round(1) }}"
          learning_enabled: "{{ states('input_boolean.bf_learning_enabled') }}"

      # Sensor jakości uczenia (jak dobrze system się nauczył)
      - name: "Battery Fusion Learning Quality"
        unique_id: battery_fusion_learning_quality
        unit_of_measurement: "%"
        state: >
          {% set samples = states('input_number.bf_learning_samples') | int(0) %}
          {% set error = states('input_number.bf_cumulative_error') | float(0) | abs %}
          {% if samples < 5 %}
            0
          {% elif error < 2 %}
            100
          {% elif error < 5 %}
            80
          {% elif error < 10 %}
            60
          {% else %}
            40
          {% endif %}
        attributes:
          samples_count: "{{ states('input_number.bf_learning_samples') | int(0) }}"
          cumulative_error: "{{ states('input_number.bf_cumulative_error') | float(0) | round(2) }}"
          status: >
            {% set samples = states('input_number.bf_learning_samples') | int(0) %}
            {% if samples < 3 %}
              Zbyt mało próbek
            {% elif samples < 10 %}
              Uczenie w toku
            {% else %}
              Wytrenowany
            {% endif %}

      # Estymowany SoC baterii 1 (Felicity lub bat1)
      - name: "Battery 1 SOC Estimated"
        unique_id: battery_1_soc_estimated
        unit_of_measurement: "%"
        state: >
          {% set soc_final = states('sensor.battery_fusion_soc_final') | float(0) %}
          {{ soc_final | round(1) }}
        attributes:
          note: "Estymacja - baterie rozładowują się proporcjonalnie do pojemności"

      # Estymowany SoC baterii 2 (JK BMS lub bat2)
      - name: "Battery 2 SOC Estimated"
        unique_id: battery_2_soc_estimated
        unit_of_measurement: "%"
        state: >
          {% set soc_final = states('sensor.battery_fusion_soc_final') | float(0) %}
          {{ soc_final | round(1) }}
        attributes:
          note: "Estymacja - baterie rozładowują się proporcjonalnie do pojemności"
