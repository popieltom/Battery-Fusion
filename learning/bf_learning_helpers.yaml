# =============================================================
# BATTERY FUSION — Adaptive Learning Helpers
# Wersja: 1.0
#
# Helpery dla systemu adaptacyjnej kalibracji SoC.
# Dodaj do configuration.yaml:
#   homeassistant:
#     packages:
#       bf_learning: !include learning/bf_learning_helpers.yaml
# =============================================================

input_number:
  # Współczynnik korekcji SoC (uczony automatycznie)
    bf_soc_correction:
        name: "BF SOC Correction"
            min: -30
                max: 30
                    step: 0.01
                        unit_of_measurement: "%"
                            icon: mdi:battery-sync

                              # Szybkość uczenia (0.05 = wolne/stabilne, 0.2 = szybkie)
                                bf_learning_rate:
                                    name: "BF Learning Rate"
                                        min: 0.01
                                            max: 0.5
                                                step: 0.01
                                                    initial: 0.1
                                                        icon: mdi:speedometer

                                                          # Ręczne wpisanie prawdziwego SoC (wyzwala uczenie)
                                                            bf_real_soc_input:
                                                                name: "BF Real SOC Input"
                                                                    min: 0
                                                                        max: 100
                                                                            step: 0.1
                                                                                unit_of_measurement: "%"
                                                                                    icon: mdi:battery-check

                                                                                      # Adaptacyjna sprawność ładowania (uczona automatycznie)
                                                                                        bf_adaptive_efficiency:
                                                                                            name: "BF Adaptive Charge Efficiency"
                                                                                                min: 70
                                                                                                    max: 100
                                                                                                        step: 0.1
                                                                                                            initial: 97.0
                                                                                                                unit_of_measurement: "%"
                                                                                                                    icon: mdi:battery-charging-80
                                                                                                                    
                                                                                                                      # Liczba próbek zebranych przez system uczący
                                                                                                                        bf_learning_samples:
                                                                                                                            name: "BF Learning Samples Count"
                                                                                                                                min: 0
                                                                                                                                    max: 9999
                                                                                                                                        step: 1
                                                                                                                                            initial: 0
                                                                                                                                                icon: mdi:counter
                                                                                                                                                
                                                                                                                                                  # Skumulowany błąd (do śledzenia jakości uczenia)
                                                                                                                                                    bf_cumulative_error:
                                                                                                                                                        name: "BF Cumulative Error"
                                                                                                                                                            min: -100
                                                                                                                                                                max: 100
                                                                                                                                                                    step: 0.01
                                                                                                                                                                        initial: 0
                                                                                                                                                                            unit_of_measurement: "%"
                                                                                                                                                                                icon: mdi:chart-bell-curve
                                                                                                                                                                                
                                                                                                                                                                                input_boolean:
                                                                                                                                                                                  # Włącz/wyłącz system uczący
                                                                                                                                                                                    bf_learning_enabled:
                                                                                                                                                                                        name: "BF Adaptive Learning Enabled"
                                                                                                                                                                                            icon: mdi:robot-outline
                                                                                                                                                                                            
                                                                                                                                                                                              # Flaga: czy system jest w fazie aktywnego uczenia
                                                                                                                                                                                                bf_learning_active:
                                                                                                                                                                                                    name: "BF Learning Phase Active"
                                                                                                                                                                                                        icon: mdi:school-outline
