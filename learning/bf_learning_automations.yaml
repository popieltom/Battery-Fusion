# =============================================================
# BATTERY FUSION — Adaptive Learning Automations
# Wersja: 1.0
#
# Automatyzacje adaptacyjnego uczenia SoC.
# System uczy się na podstawie ręcznie wpisywanych wartości rzeczywistego SoC.
#
# JAK UŻYWAĆ:
# 1. Włącz bf_learning_enabled
# 2. Odczytaj prawdziwy SoC z BMS (np. JK BMS wyświetlacz)
# 3. Wpisz wartość w input_number.bf_real_soc_input
# 4. System automatycznie skoryguje licznik
#
# KIEDY WPISYWAĆ:
# - Najlepiej gdy bateria ~100% lub ~10-20% (wtedy BMS jest najbardziej dokładny)
# - NIE wpisuj w środku cyklu (30-70%) - BMS bywa tam mniej dokładny
# =============================================================

automation:

  # -----------------------------------------------------------
    # 1. ADAPTACYJNE UCZENIE — wyzwalane ręcznym wpisem SoC
      # -----------------------------------------------------------
        - alias: "🧠 Battery Fusion: Adaptive Learning (manual trigger)"
            id: battery_fusion_adaptive_learning
                description: >
                      Uczy się korekcji SoC gdy użytkownik wpisze prawdziwy SoC z BMS.
                            Używa algorytmu EMA (Exponential Moving Average) do stabilnego uczenia.
                                trigger:
                                      - platform: state
                                              entity_id: input_number.bf_real_soc_input
                                                  condition:
                                                        - condition: state
                                                                entity_id: input_boolean.bf_learning_enabled
                                                                        state: "on"
                                                                              - condition: template
                                                                                      value_template: >
                                                                                                {{ states('input_number.bf_real_soc_input') not in ['unknown', 'unavailable', '0'] }}
                                                                                                      - condition: template
                                                                                                              value_template: >
                                                                                                                        {{ states('input_number.bf_real_soc_input') | float(0) > 0 }}
                                                                                                                            action:
                                                                                                                                  - variables:
                                                                                                                                            real_soc: "{{ states('input_number.bf_real_soc_input') | float(0) }}"
                                                                                                                                                      bf_soc: "{{ states('sensor.battery_fusion_soc') | float(0) }}"
                                                                                                                                                                error: "{{ real_soc - bf_soc }}"
                                                                                                                                                                          rate: "{{ states('input_number.bf_learning_rate') | float(0.1) }}"
                                                                                                                                                                                    current_corr: "{{ states('input_number.bf_soc_correction') | float(0) }}"
                                                                                                                                                                                              new_corr: "{{ current_corr + (error * rate) }}"
                                                                                                                                                                                                        samples: "{{ states('input_number.bf_learning_samples') | int(0) + 1 }}"
                                                                                                                                                                                                                  cum_error: "{{ states('input_number.bf_cumulative_error') | float(0) + error }}"
                                                                                                                                                                                                                        # Aktualizuj korekcję
                                                                                                                                                                                                                              - service: input_number.set_value
                                                                                                                                                                                                                                      target:
                                                                                                                                                                                                                                                entity_id: input_number.bf_soc_correction
                                                                                                                                                                                                                                                        data:
                                                                                                                                                                                                                                                                  value: "{{ new_corr | round(2) }}"
                                                                                                                                                                                                                                                                        # Inkrementuj licznik próbek
                                                                                                                                                                                                                                                                              - service: input_number.set_value
                                                                                                                                                                                                                                                                                      target:
                                                                                                                                                                                                                                                                                                entity_id: input_number.bf_learning_samples
                                                                                                                                                                                                                                                                                                        data:
                                                                                                                                                                                                                                                                                                                  value: "{{ samples }}"
                                                                                                                                                                                                                                                                                                                        # Aktualizuj skumulowany błąd
                                                                                                                                                                                                                                                                                                                              - service: input_number.set_value
                                                                                                                                                                                                                                                                                                                                      target:
                                                                                                                                                                                                                                                                                                                                                entity_id: input_number.bf_cumulative_error
                                                                                                                                                                                                                                                                                                                                                        data:
                                                                                                                                                                                                                                                                                                                                                                  value: "{{ cum_error | round(2) }}"
                                                                                                                                                                                                                                                                                                                                                                        # Powiadomienie z wynikiem
                                                                                                                                                                                                                                                                                                                                                                              - service: persistent_notification.create
                                                                                                                                                                                                                                                                                                                                                                                      data:
                                                                                                                                                                                                                                                                                                                                                                                                title: "🧠 Battery Fusion — Uczenie"
                                                                                                                                                                                                                                                                                                                                                                                                          message: >
                                                                                                                                                                                                                                                                                                                                                                                                                      Nowa próbka #{{"#{samples}"}}: 
                                                                                                                                                                                                                                                                                                                                                                                                                                  Prawdziwy SoC: {{ real_soc | round(1) }}%
                                                                                                                                                                                                                                                                                                                                                                                                                                              BF SoC przed: {{ bf_soc | round(1) }}%
                                                                                                                                                                                                                                                                                                                                                                                                                                                          Błąd: {{ error | round(2) }}%
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      Nowa korekcja: {{ new_corr | round(2) }}%
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  Próbki łącznie: {{ samples }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      mode: single
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        # -----------------------------------------------------------
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # 2. ADAPTACYJNA SPRAWNOŚĆ ŁADOWANIA
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            # -----------------------------------------------------------
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - alias: "🧠 Battery Fusion: Adaptive Efficiency Learning"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  id: battery_fusion_efficiency_learning
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      description: >
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            Uczy się rzeczywistej sprawności ładowania na podstawie pełnych cykli.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  Uruchamia się gdy bateria osiągnie 100% (po kalibracji).
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      trigger:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - platform: state
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    entity_id: input_number.bf_battery_energy_kwh
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        condition:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - condition: state
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      entity_id: input_boolean.bf_learning_enabled
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              state: "on"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - condition: template
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            value_template: >
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      {% set energy = states('input_number.bf_battery_energy_kwh') | float(0) %}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                {% set cap = states('input_number.bf_battery_1_capacity_kwh') | float(0) + states('input_number.bf_battery_2_capacity_kwh') | float(0) %}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          {{ energy >= cap * 0.99 }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              action:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - variables:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              current_eff: "{{ states('input_number.bf_adaptive_efficiency') | float(97) }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        # EMA z wagą 0.7/0.3 — stabilne uczenie
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  new_eff: "{{ (current_eff * 0.7 + 97.0 * 0.3) | round(1) }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - service: input_number.set_value
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                target:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          entity_id: input_number.bf_adaptive_efficiency
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  data:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            value: "{{ new_eff }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                mode: single
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  # -----------------------------------------------------------
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    # 3. RESET SYSTEMU UCZĄCEGO
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      # -----------------------------------------------------------
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - alias: "🔄 Battery Fusion: Reset Learning"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            id: battery_fusion_reset_learning
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                description: >
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      Resetuje system uczący do wartości domyślnych.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            Wyzwól ręcznie przez Developer Tools → Usługi.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                trigger: []
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    action:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - service: input_number.set_value
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  target:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            entity_id: input_number.bf_soc_correction
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    data:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              value: 0
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - service: input_number.set_value
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            target:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      entity_id: input_number.bf_learning_samples
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              data:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        value: 0
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - service: input_number.set_value
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      target:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                entity_id: input_number.bf_cumulative_error
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        data:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  value: 0
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - service: input_number.set_value
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                target:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          entity_id: input_number.bf_adaptive_efficiency
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  data:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            value: 97.0
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - service: persistent_notification.create
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          data:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    title: "🔄 Battery Fusion — Reset uczenia"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              message: "System uczący zresetowany do wartości domyślnych."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  mode: single
