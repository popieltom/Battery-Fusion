# =============================================================
# BATTERY FUSION — Lovelace Entities Card
# Version: 2.2
#
# HOW TO ADD TO LOVELACE:
#   1. Open your Lovelace dashboard → Edit mode
#   2. Add card → Manual
#   3. Paste everything from "type: entities" onwards
#   4. Save
#
# REQUIRED PACKAGES (copy to your HA packages/ directory):
#   bf_configuration.yaml  — helpers (input_number / input_text)
#   bf_templates.yaml      — sensor.battery_fusion_soc etc.
#   bf_automations.yaml    — Coulomb counter and auto-calibration
#   bf_scripts.yaml        — Apply calibration and Calibrate from voltage
#
# ENTITIES USED:
#   sensor.battery_fusion_soc              (bf_templates.yaml)
#   sensor.battery_fusion_power_normalized (bf_templates.yaml)
#   sensor.battery_fusion_status           (bf_templates.yaml)
#   input_number.bf_battery_energy_kwh     (bf_configuration.yaml)
#   input_number.bf_battery_1_initial_soc  (bf_configuration.yaml)
#   input_number.bf_battery_2_initial_soc  (bf_configuration.yaml)
#   script.battery_fusion_apply_calibration       (bf_scripts.yaml)
#   script.battery_fusion_calibrate_from_voltage  (bf_scripts.yaml)
#
# Per-battery SoC values are proportional estimates based on
# configured capacities — not individual BMS readings.
# =============================================================

type: entities
title: 🔋 Battery Fusion — Calibration
state_color: true
show_header_toggle: false

entities:

  # -----------------------------------------------------------
  # STATE OF CHARGE
  # -----------------------------------------------------------
  - type: section
    label: State of Charge

  - entity: sensor.battery_fusion_soc
    name: 🔋 Combined SoC
    icon: mdi:battery-charging

  - type: attribute
    entity: sensor.battery_fusion_soc
    attribute: battery_1_soc_est
    name: Battery 1 SoC (est.)
    icon: mdi:battery-outline
    suffix: "%"

  - type: attribute
    entity: sensor.battery_fusion_soc
    attribute: battery_2_soc_est
    name: Battery 2 SoC (est.)
    icon: mdi:battery-outline
    suffix: "%"

  # -----------------------------------------------------------
  # ENERGY & POWER
  # -----------------------------------------------------------
  - type: divider

  - entity: input_number.bf_battery_energy_kwh
    name: ⚡ Total Energy
    icon: mdi:lightning-bolt

  - entity: sensor.battery_fusion_power_normalized
    name: 📊 Power
    icon: mdi:transmission-tower

  - entity: sensor.battery_fusion_status
    name: 🔄 State
    icon: mdi:information-outline

  # -----------------------------------------------------------
  # CALIBRATION
  #
  # How to calibrate manually:
  #   1. Check your battery display or BMS app for each battery's SoC.
  #   2. Set the sliders below to those values.
  #   3. Press "Apply calibration" — the Coulomb counter is updated:
  #        energy = (bat1% / 100 × cap1_kWh) + (bat2% / 100 × cap2_kWh)
  #
  # Calibrate from voltage:
  #   Use when the battery has been idle for 10+ minutes (OCV stable).
  #   Voltage is mapped linearly between bf_voltage_empty and bf_voltage_full.
  #
  # Auto-calibration runs automatically at full/empty voltage —
  # manual calibration is only needed at first start or after a long outage.
  # -----------------------------------------------------------
  - type: divider

  - type: section
    label: Calibration

  - entity: input_number.bf_battery_1_initial_soc
    name: ⬆ Battery 1 initial SoC
    icon: mdi:battery-50

  - entity: input_number.bf_battery_2_initial_soc
    name: ⬆ Battery 2 initial SoC
    icon: mdi:battery-50

  - entity: script.battery_fusion_apply_calibration
    name: ✅ Apply calibration
    icon: mdi:check-circle-outline

  - entity: script.battery_fusion_calibrate_from_voltage
    name: ⚡ Calibrate from voltage (idle)
    icon: mdi:tune
