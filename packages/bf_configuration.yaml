# =============================================================
# BATTERY FUSION — Universal Configuration
# Version: 2.1
#
# Step 1: Copy this file to your HA packages/ directory
# Step 2: Fill in the values for your system
# Step 3: Add bf_templates.yaml and bf_automations.yaml
# Step 4: Restart Home Assistant
#
# Full setup guide: docs/INSTALLATION.md
# =============================================================

input_number:

  # -----------------------------------------------------------
  # BATTERY CAPACITIES
  # -----------------------------------------------------------
  bf_battery_1_capacity_kwh:
    name: "BF: Battery 1 capacity (kWh)"
    min: 0.1
    max: 200
    step: 0.1
    unit_of_measurement: kWh
    icon: mdi:battery
    initial: 12.5

  bf_battery_2_capacity_kwh:
    name: "BF: Battery 2 capacity (kWh)"
    min: 0          # set to 0 if you have only one battery
    max: 200
    step: 0.1
    unit_of_measurement: kWh
    icon: mdi:battery
    initial: 16.0

  # -----------------------------------------------------------
  # CALIBRATION — initial SoC per battery
  # Used by the "Apply calibration" button on the Lovelace card
  # and by script.battery_fusion_apply_calibration.
  # Set these to your best estimate, then press Apply.
  # -----------------------------------------------------------
  bf_battery_1_initial_soc:
    name: "BF: Battery 1 initial SoC (%)"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-50
    initial: 50

  bf_battery_2_initial_soc:
    name: "BF: Battery 2 initial SoC (%)"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-50
    initial: 50

  # Current energy stored (Coulomb Counter state)
  bf_battery_energy_kwh:
    name: "BF: Energy in batteries (kWh)"
    min: 0
    max: 500
    step: 0.001
    unit_of_measurement: kWh
    icon: mdi:battery-charging
    mode: box      # display as text input, not slider — easier for manual calibration
    initial: 4.3

  # -----------------------------------------------------------
  # CALIBRATION VOLTAGES — adjust for your battery chemistry
  #
  # Typical values:
  #   LiFePO4 16S:  full=55.0V  empty=48.2V
  #   LiFePO4 15S:  full=51.5V  empty=45.0V
  #   NMC 14S:      full=58.8V  empty=42.0V
  #   Lead-acid:    full=54.0V  empty=46.0V
  # -----------------------------------------------------------
  bf_voltage_full:
    name: "BF: Voltage at 100% (V)"
    min: 10
    max: 100
    step: 0.1
    unit_of_measurement: V
    icon: mdi:lightning-bolt
    initial: 55.2   # float voltage from inverter settings

  bf_voltage_empty:
    name: "BF: Voltage at 0% (V)"
    min: 10
    max: 100
    step: 0.1
    unit_of_measurement: V
    icon: mdi:lightning-bolt-outline
    initial: 48.0   # empty voltage from inverter settings

  # -----------------------------------------------------------
  # COUNTER PARAMETERS
  # -----------------------------------------------------------
  bf_charge_efficiency:
    name: "BF: Charging efficiency (%)"
    min: 80
    max: 100
    step: 0.5
    unit_of_measurement: "%"
    icon: mdi:percent
    initial: 95   # from inverter_battery_charging_efficiency

  bf_overload_current_threshold:
    name: "BF: Overload current threshold (A)"
    min: 10
    max: 500
    step: 5
    unit_of_measurement: A
    icon: mdi:current-ac
    initial: 120

  bf_low_soc_threshold:
    name: "BF: Low SoC threshold (%)"
    min: 5
    max: 30
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-alert
    initial: 15


input_text:

  # -----------------------------------------------------------
  # INVERTER SENSOR ENTITY IDs
  # Enter the exact entity_id from your Home Assistant
  #
  # Examples:
  #   Deye/Solarman:  sensor.inverter_battery_power
  #   Sofar:          sensor.sofar_battery_power
  #   Victron:        sensor.battery_power
  #   Growatt:        sensor.growatt_battery_power
  # -----------------------------------------------------------
  bf_power_sensor:
    name: "BF: Battery power sensor (entity_id)"
    initial: "sensor.inverter_battery_power"
    max: 100

  bf_voltage_sensor:
    name: "BF: Battery voltage sensor (entity_id)"
    initial: "sensor.inverter_battery_voltage"
    max: 100

  bf_current_sensor:
    name: "BF: Battery current sensor (entity_id)"
    initial: "sensor.inverter_battery_current"
    max: 100

  bf_battery_1_name:
    name: "BF: Battery 1 name"
    initial: "Battery 1"
    max: 50

  bf_battery_2_name:
    name: "BF: Battery 2 name"
    initial: "Battery 2"
    max: 50


input_boolean:

  # -----------------------------------------------------------
  # POWER SIGN CONVENTION — critical difference between inverters!
  #
  #   OFF (default):
  #     POSITIVE value = discharging  (Deye, Growatt, Solis)
  #     NEGATIVE value = charging
  #
  #   ON:
  #     NEGATIVE value = discharging  (Sofar, some Victron)
  #     POSITIVE value = charging
  # -----------------------------------------------------------
  bf_power_sign_inverted:
    name: "BF: Inverted power sign"
    icon: mdi:swap-vertical

  # Enable to disable overload alert (e.g. when you have only 1 battery)
  bf_disable_overload_alert:
    name: "BF: Disable overload alert"
    icon: mdi:bell-off


input_select:

  # -----------------------------------------------------------
  # BATTERY COUNT
  # -----------------------------------------------------------
  bf_battery_count:
    name: "BF: Number of batteries"
    options:
      - "1"
      - "2"
      - "3+"
    initial: "2"
    icon: mdi:battery-multiple

  # -----------------------------------------------------------
  # BATTERY CHEMISTRY — used in reports
  # -----------------------------------------------------------
  bf_battery_chemistry:
    name: "BF: Battery chemistry"
    options:
      - LiFePO4
      - NMC
      - Lead-acid
      - Other
    initial: LiFePO4
    icon: mdi:atom
