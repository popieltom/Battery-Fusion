# =============================================================
# BATTERY FUSION — Automations
# Version: 2.1
#
# All thresholds and entity names read from configuration.
# No hardcoded values — works with any inverter.
#
# Automations included:
#   1. Coulomb Counter (every 1 minute)
#   2. Calibration at full charge (100%)
#   3. Calibration at near-empty (~0%)
#   4. Overload alert (one battery disconnects)
#   5. Low SoC warning
#   6. Nightly status log
# =============================================================

automation:

  # -----------------------------------------------------------
  # 1. COULOMB COUNTER — update every 1 minute
  # -----------------------------------------------------------
  - alias: "Battery Fusion: Coulomb Counter (1 min)"
    id: battery_fusion_coulomb_counter
    description: >
      Integrates battery power over time. Charging efficiency read from
      input_number.bf_charge_efficiency.
      Power sign automatically corrected via sensor.battery_fusion_power_normalized.
    trigger:
      - platform: time_pattern
        minutes: "/1"
    action:
      - variables:
          new_kwh: >
            {% set cap = states('input_number.bf_battery_1_capacity_kwh') | float(0)
                       + states('input_number.bf_battery_2_capacity_kwh') | float(0) %}
            {% set eff = states('input_number.bf_charge_efficiency') | float(97) / 100 %}
            {% set current = states('input_number.bf_battery_energy_kwh') | float(0) %}
            {% set pwr = states('sensor.battery_fusion_power_normalized') | float(0) %}
            {% set delta = pwr / 1000 / 60 %}
            {% if pwr > 0 %}
              {{ [0.0, [cap, current - delta] | min] | max }}
            {% else %}
              {{ [0.0, [cap, current + (delta | abs * eff)] | min] | max }}
            {% endif %}
      - service: input_number.set_value
        target:
          entity_id: input_number.bf_battery_energy_kwh
        data:
          value: "{{ new_kwh | round(3) }}"
    mode: single

  # -----------------------------------------------------------
  # 2. CALIBRATION — battery full (100%)
  # -----------------------------------------------------------
  - alias: "Battery Fusion: Calibrate at full charge"
    id: battery_fusion_calibrate_full
    description: >
      Resets counter to full capacity when voltage exceeds
      bf_voltage_full threshold for 5 minutes.
    trigger:
      - platform: template
        value_template: >
          {% set v_sensor = states('input_text.bf_voltage_sensor') %}
          {% set voltage = states(v_sensor) | float(0) %}
          {% set v_full = states('input_number.bf_voltage_full') | float(55.0) %}
          {{ voltage > v_full }}
        for: "00:05:00"
    condition:
      - condition: template
        value_template: >
          {{ states('sensor.battery_fusion_power_normalized') | float(0) | abs < 200 }}
    action:
      - variables:
          total_cap: >
            {{ states('input_number.bf_battery_1_capacity_kwh') | float(0)
             + states('input_number.bf_battery_2_capacity_kwh') | float(0) }}
      - service: input_number.set_value
        target:
          entity_id: input_number.bf_battery_energy_kwh
        data:
          value: "{{ total_cap }}"
      - service: persistent_notification.create
        data:
          title: "Battery Fusion — calibrated 100%"
          message: >
            Counter calibrated to {{ states('input_number.bf_battery_1_capacity_kwh') | float(0)
              + states('input_number.bf_battery_2_capacity_kwh') | float(0) }} kWh (full charge).
            Voltage: {{ states(states('input_text.bf_voltage_sensor')) }} V
    mode: single

  # -----------------------------------------------------------
  # 3. CALIBRATION — battery near empty (~0%)
  # -----------------------------------------------------------
  - alias: "Battery Fusion: Calibrate at near-empty"
    id: battery_fusion_calibrate_empty
    description: >
      Sets counter to ~2% of capacity when voltage drops
      below bf_voltage_empty threshold for 3 minutes.
    trigger:
      - platform: template
        value_template: >
          {% set v_sensor = states('input_text.bf_voltage_sensor') %}
          {% set voltage = states(v_sensor) | float(0) %}
          {% set v_empty = states('input_number.bf_voltage_empty') | float(48.2) %}
          {{ voltage > 0 and voltage < v_empty }}
        for: "00:03:00"
    action:
      - variables:
          residual_kwh: >
            {{ ((states('input_number.bf_battery_1_capacity_kwh') | float(0)
               + states('input_number.bf_battery_2_capacity_kwh') | float(0)) * 0.02) | round(2) }}
      - service: input_number.set_value
        target:
          entity_id: input_number.bf_battery_energy_kwh
        data:
          value: "{{ residual_kwh }}"
      - service: persistent_notification.create
        data:
          title: "Battery Fusion — calibrated ~0%"
          message: >
            Counter calibrated to {{ residual_kwh }} kWh (~2% capacity).
            Voltage: {{ states(states('input_text.bf_voltage_sensor')) }} V
    mode: single

  # -----------------------------------------------------------
  # 4. OVERLOAD ALERT — when one battery disconnects
  # -----------------------------------------------------------
  - alias: "Battery Fusion: Overload alert"
    id: battery_fusion_overload_alert
    description: >
      Sends notification when current exceeds bf_overload_current_threshold.
      Scenario: one battery cut off by BMS → full load on the other.
    trigger:
      - platform: template
        value_template: >
          {% set i_sensor = states('input_text.bf_current_sensor') %}
          {% set current = states(i_sensor) | float(0) | abs %}
          {% set threshold = states('input_number.bf_overload_current_threshold') | float(120) %}
          {{ current > threshold }}
        for: "00:00:30"
    condition:
      - condition: state
        entity_id: input_boolean.bf_disable_overload_alert
        state: "off"
      - condition: template
        value_template: >
          {{ states('sensor.battery_fusion_power_normalized') | float(0) > 2000 }}
    action:
      - service: persistent_notification.create
        data:
          title: "Battery Fusion: Overload detected!"
          message: >
            Current: {{ states(states('input_text.bf_current_sensor')) | float(0) | abs | round(1) }} A
            (threshold: {{ states('input_number.bf_overload_current_threshold') | float(0) | round(0) }} A)
            Power: {{ states('sensor.battery_fusion_power_normalized') | float(0) | round(0) }} W
            SoC: {{ states('sensor.battery_fusion_soc') }}%

            Possible BMS disconnection on one battery!
            Check battery status physically.
    mode: single

  # -----------------------------------------------------------
  # 5. LOW SoC WARNING
  # -----------------------------------------------------------
  - alias: "Battery Fusion: Low SoC warning"
    id: battery_fusion_low_soc_warning
    description: >
      Notification when SoC drops below bf_low_soc_threshold.
    trigger:
      - platform: template
        value_template: >
          {% set soc = states('sensor.battery_fusion_soc') | float(0) %}
          {% set threshold = states('input_number.bf_low_soc_threshold') | float(15) %}
          {{ soc < threshold and soc > 0 }}
        for: "00:02:00"
    action:
      - service: persistent_notification.create
        data:
          title: "Battery Fusion: Low SoC!"
          message: >
            SoC: {{ states('sensor.battery_fusion_soc') }}%
            (threshold: {{ states('input_number.bf_low_soc_threshold') | float(0) | round(0) }}%)
            Energy: {{ states('input_number.bf_battery_energy_kwh') | float(0) | round(2) }} kWh
            {% if states('input_select.bf_battery_count') != '1' %}
            {{ states('input_text.bf_battery_1_name') }} est.: {{ state_attr('sensor.battery_fusion_soc', 'battery_1_soc_est') }}%
            {{ states('input_text.bf_battery_2_name') }} est.: {{ state_attr('sensor.battery_fusion_soc', 'battery_2_soc_est') }}%
            {% endif %}
    mode: single

  # -----------------------------------------------------------
  # 6. NIGHTLY LOG at 00:00
  # -----------------------------------------------------------
  - alias: "Battery Fusion: Nightly log"
    id: battery_fusion_nightly_log
    description: >
      Logs system state every night at 00:00.
      Useful for tracking Coulomb counter drift over time.
    trigger:
      - platform: time
        at: "00:00:30"
    action:
      - service: persistent_notification.create
        data:
          title: "Battery Fusion — nightly report"
          message: >
            Status at 00:00:
            ─────────────────────────
            SoC: {{ states('sensor.battery_fusion_soc') }}%
            Energy: {{ states('input_number.bf_battery_energy_kwh') | float(0) | round(2) }} kWh
              / {{ (states('input_number.bf_battery_1_capacity_kwh') | float(0)
                  + states('input_number.bf_battery_2_capacity_kwh') | float(0)) | round(1) }} kWh
            Voltage: {{ states(states('input_text.bf_voltage_sensor')) }} V
            Chemistry: {{ states('input_select.bf_battery_chemistry') }}
            ─────────────────────────
            {% if states('input_select.bf_battery_count') != '1' %}
            {{ states('input_text.bf_battery_1_name') }}: {{ state_attr('sensor.battery_fusion_soc', 'battery_1_soc_est') }}% (est.)
            {{ states('input_text.bf_battery_2_name') }}: {{ state_attr('sensor.battery_fusion_soc', 'battery_2_soc_est') }}% (est.)
            ─────────────────────────
            {% endif %}
            Auto-calibration:
            > {{ states('input_number.bf_voltage_full') }}V → 100%
            < {{ states('input_number.bf_voltage_empty') }}V → 0%

            If SoC drifts from reality — calibrate manually:
            bf_battery_energy_kwh = bat1% × {{ states('input_number.bf_battery_1_capacity_kwh') }}
                                  + bat2% × {{ states('input_number.bf_battery_2_capacity_kwh') }}
    mode: single
